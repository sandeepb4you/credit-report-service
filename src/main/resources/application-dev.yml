# Local development profile.
# Activate with: --spring.profiles.active=dev  (or SPRING_PROFILES_ACTIVE=dev)
spring:
  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true

logging:
  level:
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE

# Dev: force the stub OCR so the flow runs with no cloud credentials,
# and log OTPs to the console instead of sending mail.
app:
  registration:
    ocr:
      provider: stub
